site_name: КИТОН - база знаний
site_description: Публичные гайды по веб-сервису и Telegram-боту КИТОН для репетиторов, учеников и родителей
site_url: https://skand21.github.io/kiton-guides/

docs_dir: docs
exclude_docs: |
  Tutor/*.md
  Tutor/statistics/*.md

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Темная тема
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tooltips
    - toc.follow
    - header.autohide

plugins:
  - search:
      lang: ru

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: simple/telegram
      link: https://t.me/tutor_auto_bot
      name: Telegram-бот КИТОН

nav:
  - Главная: index.md
  - Быстрый старт:
    - С чего начать: start/index.md
    - Роли и доступы: start/roles.md
    - Регистрация: start/registration.md
  - Веб-сервис:
    - Первый результат: service/tutor-start.md
    - Ученики: service/students.md
    - Расписание: service/schedule.md
    - Домашние задания: service/homework.md
    - Оплаты и баланс: service/payments.md
    - Прогресс и пробники: service/progress.md
    - Газики: service/gaziki.md
    - Группы: service/groups.md
    - Отчеты: service/reports.md
    - Настройки: service/settings.md
    - Партнерка: service/partners.md
  - Telegram-бот:
    - Что умеет бот: telegram-bot/index.md
    - Как привязать Telegram: telegram-bot/connect.md
    - Уведомления: telegram-bot/notifications.md
    - Домашние задания: telegram-bot/homework.md
    - Оплаты: telegram-bot/payments.md
    - Если что-то не работает: telegram-bot/troubleshooting.md
  - Ученикам:
    - Кабинет ученика: Student/README.md
    - Занятия: Student/lessons.md
    - Домашние задания: Student/homework.md
    - Газики: Student/gaziks.md
    - Группы: Student/groups.md
    - Оплаты: Student/payments.md
    - Профиль: Student/profile.md
  - Родителям:
    - Кабинет родителя: Parent/README.md
    - Дети: Parent/children.md
    - Домашние задания: Parent/homework.md
    - Оплаты: Parent/payments.md
    - Прогресс: Parent/progress.md
    - Профиль: Parent/profile.md
  - FAQ: faq/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: false
